<div class="page-container">
  <div class="form-box">
    <div class="form-header">
      <h3>Create New Project</h3>
      <a routerLink="/manager/projects" class="btn-back">← Back</a>
    </div>

    <div *ngIf="errorMessage" class="error-msg">
      {{ errorMessage }}
    </div>

    <div class="form-group">
      <label>Project Name</label>
      <input type="text" [(ngModel)]="name" placeholder="Enter project name" class="form-input" />
    </div>

    <div class="form-group">
      <label>Description</label>
      <textarea
        [(ngModel)]="description"
        placeholder="Enter project description"
        class="form-input"
        rows="4"
      >
      </textarea>
    </div>

    <button (click)="create()" [disabled]="loading" class="btn-create">
      {{ loading ? 'Creating...' : 'Create Project' }}
    </button>
  </div>
</div>
