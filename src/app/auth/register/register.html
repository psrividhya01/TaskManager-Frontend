<div class="register-container">
  <div class="register-box">
    <h2>Task Manager</h2>
    <h4>Register</h4>

    @if (successMessage) {
      <div class="success-msg">{{ successMessage }}</div>
    }

    @if (errorMessage) {
      <div class="error-msg">{{ errorMessage }}</div>
    }

    <div class="form-group">
      <label>Full Name</label>
      <input type="text" [(ngModel)]="fullName" placeholder="Enter full name" class="form-input" />
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" [(ngModel)]="email" placeholder="Enter email" class="form-input" />
    </div>

    <div class="form-group">
      <label>Password</label>
      <input
        type="password"
        [(ngModel)]="password"
        placeholder="Enter password"
        class="form-input"
      />
    </div>

    <button (click)="register()" [disabled]="loading" class="btn-register">
      {{ loading ? 'Registering...' : 'Register' }}
    </button>

    <p class="login-link">
      Already have an account?
      <a routerLink="/login">Login</a>
    </p>
  </div>
</div>
